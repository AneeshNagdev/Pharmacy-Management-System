<!DOCTYPE html>
<html>
<head>
    <title>Pharmacy Lab Assignment</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; max-width: 800px; margin: 0 auto; }
        .form-box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        button { padding: 8px 15px; background: #0F4C75; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 5px; }
        button:hover { background: #1B262C; }
        input { width: 95%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        #result-box { background: white; padding: 20px; border-left: 5px solid #3282B8; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Pharmacy Database Assignment</h1>

    <!-- 1. Database Controls -->
    <div class="form-box">
        <h2>1. Database Initialization</h2>
        <button onclick="runAction('drop')">Drop Tables</button>
        <button onclick="runAction('create')">Create Tables</button>
        <button onclick="runAction('populate')">Populate Dummy Data</button>
    </div>

    <!-- 2. Add New Medicine -->
    <div class="form-box">
        <h2>2. Add New Medicine</h2>
        <label>Name:</label>
        <input type="text" id="addName" placeholder="e.g. Cough Syrup">
        <label>Price ($):</label>
        <input type="number" id="addPrice" step="0.01" placeholder="e.g. 7.99">
        <label>Quantity:</label>
        <input type="number" id="addQty" placeholder="e.g. 50">
        <button onclick="addMedicine()">Add Medicine</button>
    </div>

    <!-- 3. View Medicine Info -->
    <div class="form-box">
        <h2>3. View Medicine Info (or all)</h2>
        <label>Enter Medicine ID (Leave empty to view all):</label>
        <input type="number" id="viewId" placeholder="e.g. 1">
        <button onclick="viewMedicine()">View Info</button>
    </div>

    <!-- 4. Update Medicine -->
    <div class="form-box">
        <h2>4. Update Medicine Stock</h2>
        <label>Medicine ID:</label>
        <input type="number" id="updateId" placeholder="ID to update">
        <label>New Quantity:</label>
        <input type="number" id="updateQty" placeholder="New stock amount">
        <button onclick="updateMedicine()">Update Stock</button>
    </div>

    <!-- Output Box for Backend HTML -->
    <h2>Results Output:</h2>
    <div id="result-box">Ready and waiting...</div>

    <script>
        const API = 'api.php';
        const resultBox = document.getElementById('result-box');

        // Execute simple GET requests
        async function runAction(actionName) {
            resultBox.innerHTML = "Processing...";
            try {
                const res = await fetch(`${API}?action=${actionName}`);
                const htmlString = await res.text();
                resultBox.innerHTML = htmlString;
            } catch (err) {
                resultBox.innerHTML = `<h3 style='color: red;'>Network Error: Failed to hit api.php</h3>`;
            }
        }

        // Execute raw SQL strings over POST
        async function executeQuery(sqlString) {
            resultBox.innerHTML = "Executing Query...";
            try {
                const res = await fetch(`${API}?action=query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: "query=" + encodeURIComponent(sqlString)
                });
                const htmlString = await res.text();
                resultBox.innerHTML = htmlString;
            } catch (err) {
                resultBox.innerHTML = `<h3 style='color: red;'>Network Error: Failed to hit api.php</h3>`;
            }
        }

        function addMedicine() {
            const name = document.getElementById('addName').value.replace(/'/g, "''");
            const price = document.getElementById('addPrice').value;
            const qty = document.getElementById('addQty').value;
            if(!name || !price || !qty) return alert("Please fill all fields");
            
            executeQuery(`INSERT INTO medicines (name, price, quantity) VALUES ('${name}', ${price}, ${qty})`);
        }

        function viewMedicine() {
            const id = document.getElementById('viewId').value;
            let sql = `SELECT * FROM medicines`;
            if (id) {
                sql += ` WHERE id = ${id}`;
            }
            executeQuery(sql);
        }

        function updateMedicine() {
            const id = document.getElementById('updateId').value;
            const qty = document.getElementById('updateQty').value;
            if(!id || !qty) return alert("Enter both ID and Quantity");
            
            executeQuery(`UPDATE medicines SET quantity = ${qty} WHERE id = ${id}`);
        }
    </script>
</body>
</html>
